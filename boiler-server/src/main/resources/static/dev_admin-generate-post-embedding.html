<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员帖子 Embedding 批量生成</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-input::placeholder {
            color: #aaa;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            margin-top: 12px;
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }
        .result-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .result-panel h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-item {
            background: white;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        .post-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 16px;
        }
        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .post-item:last-child {
            margin-bottom: 0;
        }
        .post-title {
            font-weight: 500;
            color: #333;
            font-size: 14px;
            flex: 1;
            word-break: break-word;
            margin-right: 12px;
        }
        .post-status {
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 14px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none !important;
        }
        .login-section, .action-section {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 帖子 Embedding 批量生成</h1>
            <p>为所有帖子生成向量嵌入</p>
        </div>

        <div class="content">
            <!-- 登录表单 -->
            <div id="loginSection" class="login-section">
                <div class="form-group">
                    <label class="form-label" for="adminUsername">管理员账号</label>
                    <input type="text" id="adminUsername" class="form-input" placeholder="请输入管理员用户名">
                </div>
                <div class="form-group">
                    <label class="form-label" for="adminPassword">密码</label>
                    <input type="password" id="adminPassword" class="form-input" placeholder="请输入密码">
                </div>
                <button id="loginBtn" class="btn btn-primary">登录</button>
                <div id="loginError" class="error-message hidden"></div>
            </div>

            <!-- 操作区域（登录后显示） -->
            <div id="actionSection" class="action-section hidden">
                <div style="background: #e8f4fd; padding: 16px; border-radius: 8px; margin-bottom: 20px;">
                    <p style="margin: 0; color: #0066cc; font-size: 14px;">
                        <strong>当前登录管理员：</strong><span id="currentAdmin"></span>
                    </p>
                </div>

                <div style="background: #fff3cd; padding: 16px; border-radius: 8px; margin-bottom: 20px;">
                    <p style="margin: 0; color: #856404; font-size: 13px;">
                        <strong>⚠️ 操作说明：</strong>点击“批量生成 Embedding”将为所有帖子生成向量嵌入。此操作可能需要一些时间，请耐心等待。
                    </p>
                </div>

                <button id="generateBtn" class="btn btn-danger">
                    🚀 批量生成 Embedding
                </button>

                <button id="logoutBtn" class="btn btn-primary" style="margin-top: 12px; background: #6c757d;">
                    退出登录
                </button>

                <div id="actionError" class="error-message hidden"></div>

                <!-- 结果显示区域 -->
                <div id="resultPanel" class="result-panel hidden">
                    <h3>📈 生成结果</h3>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="totalCount">0</div>
                            <div class="stat-label">总帖子数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="generatedCount">0</div>
                            <div class="stat-label">已生成</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="failedCount">0</div>
                            <div class="stat-label">失败</div>
                        </div>
                    </div>
                    <h3 style="margin-top: 16px; font-size: 14px;">帖子处理详情</h3>
                    <div class="post-list" id="postList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const BASE_URL = (window.location.origin && window.location.origin !== 'null')
            ? window.location.origin
            : '';

        // DOM 元素
        const loginSection = document.getElementById('loginSection');
        const actionSection = document.getElementById('actionSection');
        const adminUsername = document.getElementById('adminUsername');
        const adminPassword = document.getElementById('adminPassword');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const generateBtn = document.getElementById('generateBtn');
        const loginError = document.getElementById('loginError');
        const actionError = document.getElementById('actionError');
        const currentAdmin = document.getElementById('currentAdmin');
        const resultPanel = document.getElementById('resultPanel');
        const totalCount = document.getElementById('totalCount');
        const generatedCount = document.getElementById('generatedCount');
        const failedCount = document.getElementById('failedCount');
        const postList = document.getElementById('postList');

        let adminToken = localStorage.getItem('admin_token');
        let adminUsernameStored = localStorage.getItem('admin_username');

        // 页面加载时检查是否已登录
        if (adminToken && adminUsernameStored) {
            showActionSection(adminUsernameStored);
        }

        // 登录
        loginBtn.addEventListener('click', async () => {
            const username = adminUsername.value.trim();
            const password = adminPassword.value;

            if (!username || !password) {
                showError(loginError, '请输入管理员账号和密码');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> 登录中...';

            try {
                const response = await fetch(`${BASE_URL}/user/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.code === 1 && data.data && data.data.token) {
                    // 检查是否是管理员
                    if (data.data.userInfo && data.data.userInfo.userType === 'ADMIN') {
                        adminToken = data.data.token;
                        localStorage.setItem('admin_token', adminToken);
                        localStorage.setItem('admin_username', username);
                        showActionSection(username);
                    } else {
                        showError(loginError, '该账号不是管理员账号，无法使用此功能');
                    }
                } else {
                    showError(loginError, data.msg || '登录失败，请检查账号密码');
                }
            } catch (error) {
                showError(loginError, '网络错误，请稍后重试');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });

        // 退出登录
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_username');
            adminToken = null;
            adminUsernameStored = null;
            showLoginSection();
        });

        // 批量生成 Embedding
        generateBtn.addEventListener('click', async () => {
            if (!confirm('确定要为所有帖子生成向量嵌入吗？此操作可能需要一些时间。')) {
                return;
            }

            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="loading"></span> 正在生成中，请稍候...';
            hideError(actionError);
            resultPanel.classList.add('hidden');

            try {
                const response = await fetch(`${BASE_URL}/post/admin/embedding/vectorize-all`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.code === 1 && data.data) {
                    showResult(data.data);
                } else {
                    showError(actionError, data.msg || '生成失败，请稍后重试');
                }
            } catch (error) {
                showError(actionError, '网络错误，请稍后重试');
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '🚀 批量生成 Embedding';
            }
        });

        // 显示登录区域
        function showLoginSection() {
            loginSection.classList.remove('hidden');
            actionSection.classList.add('hidden');
            adminUsername.value = '';
            adminPassword.value = '';
            hideError(loginError);
        }

        // 显示操作区域
        function showActionSection(username) {
            loginSection.classList.add('hidden');
            actionSection.classList.remove('hidden');
            currentAdmin.textContent = username;
            hideError(actionError);
        }

        // 显示结果
        function showResult(data) {
            totalCount.textContent = data.totalPostCount || 0;
            generatedCount.textContent = data.generatedCount || 0;
            failedCount.textContent = data.failedCount || 0;

            // 渲染帖子列表
            postList.innerHTML = '';
            if (data.results && data.results.length > 0) {
                data.results.forEach(result => {
                    const item = document.createElement('div');
                    item.className = 'post-item';
                    
                    const statusClass = result.success ? 'status-success' : 'status-failed';
                    const statusText = result.success ? '成功' : (result.errorMessage || '失败');
                    
                    item.innerHTML = `
                        <span class="post-title">${result.title || '未知'}</span>
                        <span class="post-status ${statusClass}">${statusText}</span>
                    `;
                    postList.appendChild(item);
                });
            } else {
                postList.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">暂无帖子数据</div>';
            }

            resultPanel.classList.remove('hidden');
        }

        // 显示错误
        function showError(element, message) {
            element.textContent = message;
            element.classList.remove('hidden');
        }

        // 隐藏错误
        function hideError(element) {
            element.classList.add('hidden');
        }

        // 回车键登录
        adminPassword.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });
    </script>
</body>
</html>
